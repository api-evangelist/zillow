apis:
- aid: zillow:zillow-web-services-historical
  name: Zillow Web Services (Historical / Sunset)
  description: Zillow Web Services were the legacy public XML-based APIs from Zillow
    including GetSearchResults, GetZestimate, GetDeepSearchResults, GetUpdatedPropertyDetails,
    GetComps, GetRegionChildren, and the Neighborhood and Mortgage APIs. The full
    suite was deprecated and shut down on September 30, 2021. Existing keys stopped
    functioning. No new access is granted. Equivalent listing and valuation data is
    now delivered to licensed parties through Bridge Interactive.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.zillowgroup.com/developers
  baseURL: https://www.zillow.com/webservice
  tags:
  - Deprecated
  - Listings
  - Real Estate
  - Sunset
  - Zestimate
  properties:
  - type: Successor
    url: https://bridgedataoutput.com
  - type: Announcement
    url: https://www.zillowgroup.com/developers
  - url: graphql/zillow-graphql.md
    type: GraphQL
- aid: zillow:bridge-interactive-api
  name: Bridge Interactive API
  description: Bridge Interactive is Zillow Group's RESO-compliant data distribution
    platform for MLSs, brokers, and approved vendors. It exposes a RESO Web API (OData-based)
    for searching listings, members, offices, media, and other RESO Data Dictionary
    resources, plus a Listing Output service for bulk replication. Access requires
    MLS approval and is gated per data feed.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://bridgedataoutput.com/docs/platform/
  baseURL: https://api.bridgedataoutput.com
  tags:
  - Bridge
  - Listings
  - MLS
  - OData
  - Real Estate
  - RESO
  properties:
  - type: Documentation
    url: https://bridgedataoutput.com/docs/platform/
  - type: Portal
    url: https://bridgedataoutput.com
  - type: Authentication
    url: https://bridgedataoutput.com/docs/platform/?ref=authentication
- aid: zillow:zillow-tech-connect
  name: Zillow Tech Connect
  description: Zillow Tech Connect is the partner program that lets approved real-estate
    software vendors integrate with Zillow Premier Agent for contact, lead, and listing
    sync. Vendors are vetted and onboarded directly with Zillow Group rather than
    via a self-serve developer portal.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.zillowgroup.com/tech-connect/
  baseURL: https://www.zillowgroup.com/tech-connect/
  tags:
  - CRM
  - Leads
  - Partners
  - Real Estate
  properties:
  - type: Portal
    url: https://www.zillowgroup.com/tech-connect/
- aid: zillow:mortech-api
  name: Mortech API
  description: Mortech is Zillow Group's mortgage pricing and product eligibility
    engine for lenders and partners. It exposes web services for real-time rate quotes,
    scenario pricing, and product and pricing engine (PPE) workflows used by lender
    websites, LOS integrations, and rate tables on Zillow.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.mortech-inc.com
  baseURL: https://www.mortech-inc.com
  tags:
  - Lenders
  - Mortgage
  - Pricing
  - Rates
  properties:
  - type: Portal
    url: https://www.mortech-inc.com
- aid: zillow:showcase-api
  name: Zillow Showcase
  description: Zillow Showcase is a premium listing enhancement product for agents
    and MLSs that integrates immersive media (interactive floor plans, virtual tours,
    AI-enhanced photography) into Zillow listings. Integration is delivered through
    MLS feed enrichment and Zillow Group partner onboarding rather than a self-serve
    public API.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.zillow.com/z/showcase/
  baseURL: https://www.zillow.com
  tags:
  - Listings
  - Media
  - MLS
  - Real Estate
  - Showcase
  properties:
  - type: Portal
    url: https://www.zillow.com/z/showcase/
