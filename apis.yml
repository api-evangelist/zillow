aid: zillow
name: Zillow
description: Zillow is the largest U.S. real-estate marketplace, offering home and
  rental listings, Zestimate home value estimates, mortgage tools, and a connected
  agent and lender ecosystem. Zillow Group owns Trulia, StreetEasy, HotPads, Out East,
  Bridge Interactive, Mortech, Showcase, and ShowingTime+. Zillow sunset its legacy
  public consumer APIs (Zillow Web Services, the GetSearchResults / GetZestimate /
  Property Details APIs and the Mortgage APIs) on September 30, 2021. Programmatic
  access to Zillow Group listing, broker, and lender data is now delivered through
  Bridge Interactive (bridgedataoutput.com) for licensed real-estate professionals
  and MLSs, the Zillow Tech Connect partner program for vendors, Mortech for mortgage
  pricing, and the Showcase listing enhancement product. This profile documents what
  is publicly findable on each surviving API surface.
